<!DOCTYPE html>
<html lang="es">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-4">Editar Movimiento</h2>
        <form action="/actualizar-movimiento/{{ m[0] }}" method="POST" class="space-y-4">
            <select name="tipo" class="w-full p-2 border rounded"><option value="INGRESO" {% if m[1]=='INGRESO' %}selected{% endif %}>Ingreso</option><option value="EGRESO" {% if m[1]=='EGRESO' %}selected{% endif %}>Egreso</option></select>
            <input type="text" name="concepto" value="{{ m[2] }}" class="w-full p-2 border rounded">
            <input type="text" name="categoria" value="{{ m[3] }}" class="w-full p-2 border rounded">
            <input type="number" step="0.01" name="monto" value="{{ m[4] }}" class="w-full p-2 border rounded">
            <button type="submit" class="bg-blue-600 text-white w-full py-2 rounded">Guardar Cambios</button>
            <a href="/" class="block text-center text-gray-500 mt-2">Cancelar</a>
        </form>
    </div>
</body>
</html>
