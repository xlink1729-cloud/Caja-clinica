<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ CLINIC_NAME }} - Control de Caja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 flex justify-between items-center">
        </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        {% if mensaje %}
        <div class="p-4 bg-emerald-500 text-white rounded-lg shadow-md font-medium">{{ mensaje }}</div>
        {% endif %}

        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">📝 Registrar Movimiento de Efectivo</h2>
            <form action="/guardar-movimiento" method="POST" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Fecha</label>
                    <input type="date" name="fecha" required class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                </form>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-4 text-gray-700">🗓️ Ganancias por Semana</h2>
                </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold mb-4 text-gray-700">📊 Ganancias por Mes</h2>
                </div>
        </div>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">🕒 Últimos 15 Movimientos</h2>
            </section>
    </main>
</body>
</html>
