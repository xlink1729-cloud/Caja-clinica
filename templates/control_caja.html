<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ CLINIC_NAME }} - Control de Caja</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img src="/static/logo.jpg" alt="Logo {{ CLINIC_NAME }}" class="h-12 w-auto object-contain">
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="hidden md:inline-block bg-emerald-100 text-emerald-800 text-xs font-semibold px-3 py-1 rounded-full border border-emerald-200">
                Control de Efectivo Activo
            </span>
            <a href="/logout" class="text-xs bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-600 font-bold px-3 py-2 rounded-lg border border-gray-200 transition">
                Cerrar Sesión
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        {% if mensaje %}
        <div class="p-4 bg-emerald-500 text-white rounded-lg shadow-md font-medium">
            {{ mensaje }}
        </div>
        {% endif %}

        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">📝 Registrar Movimiento de Efectivo</h2>
            <form action="/guardar-movimiento" method="POST" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Fecha</label>
                    <input type="date" name="fecha" required class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Tipo de flujo</label>
                    <select name="tipo" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="INGRESO">📥 Ingreso</option>
                        <option value="EGRESO">📤 Egreso</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Concepto</label>
                    <input type="text" name="concepto" required placeholder="Ej: Consulta Juan Pérez" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Categoría</label>
                    <input type="text" name="categoria" required placeholder="Ej: Servicio, Insumos" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Monto ($)</label>
                    <div class="flex">
                        <input type="number" step="0.01" name="monto" required placeholder="0.00" class="w-full p-2.5 border rounded-l-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 rounded-r-lg transition">Guardar</button>
                    </div>
                </div>
            </form>
        </section>

        </main>
</body>
</html>
